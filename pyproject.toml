[tool.black]
line-length = 88
target-version = ['py310']
exclude = '''
/(
    \.git
  | \.venvv
  | \.venv
  | __pycache__
  | build
  | dist
)/
'''


[tool.isort]
profile = "black"
line_length = 88
skip = [
    ".venvv",
    ".venv",
    "__pycache__"
]


[tool.ruff]
line-length = 88
target-version = "py310"

exclude = [
    ".git",
    ".venvv",
    ".venv",
    "__pycache__",
    "build",
    "dist"
]


[tool.ruff.lint]
select = [
    "E",
    "F",
    "I"
]

ignore = [
    "E501"
]